services:
  app:
    # 共有ベースイメージを「参照するだけ」。全プロジェクトが同じタグ＝実体は1コピー。
    # 先に一度だけ：docker build -t ai-devbox:1.0 . でベースを作る。
    image: ai-devbox:1.0
    volumes:
      - .:/app
      # 認証・設定は名前付きボリュームに分離（イメージには焼き込まない）。
      # 各マシンで空のまま起動 → 利用者が自分でログインする。
      - claude-code-config:/home/appuser/.claude
      - codex-config:/home/appuser/.codex
      - gemini-config:/home/appuser/.gemini
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    command: sleep infinity
    tty: true
    stdin_open: true

volumes:
  claude-code-config:
  codex-config:
  gemini-config:
