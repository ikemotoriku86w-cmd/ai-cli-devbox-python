services:
  app:
    # プロジェクト固有のイメージをビルドする（build: .）。
    # tools 層は BuildKit キャッシュ／内容アドレス可能レイヤーで他プロジェクトと共有され、
    # requirements.txt 変更時のみ最終層が再ビルドされる。
    # 固定共有タグ（旧 image: ai-devbox:1.0）は使わないため、タグ上書き衝突は起きない。
    build: .
    volumes:
      - .:/app
      # 認証・設定は名前付きボリュームに分離（イメージには焼き込まない）。
      # 各マシンで空のまま起動 → 利用者が自分でログインする。
      - claude-code-config:/home/appuser/.claude
      - codex-config:/home/appuser/.codex
      - gemini-config:/home/appuser/.gemini
      # 全業務共通のCLAUDE.md・skills(Mac mini側 ~/claude-shared を読み取り専用で共有)
      - ~/claude-shared:/claude-shared:ro
      # 社内会議の文字起こし(議事録作成スキル用。読み取り専用)
      - ~/Sync/recordings:/mnt/transcripts:ro
      # /tell の郵便受け(書き込み可。Mac mini側 tell-watcher が配達する)
      - ~/claude-bridge:/claude-bridge
      - ~/.gitcreds-container:/home/appuser/.gitcreds:ro
    environment:
      - PYTHONPATH=/app
      - GIT_TERMINAL_PROMPT=0
      - GIT_CONFIG_COUNT=3
      - GIT_CONFIG_KEY_0=credential.helper
      - "GIT_CONFIG_VALUE_0=!f() { cat /home/appuser/.gitcreds; }; f"
      - GIT_CONFIG_KEY_1=user.name
      - GIT_CONFIG_VALUE_1=ikemori
      - GIT_CONFIG_KEY_2=user.email
      - GIT_CONFIG_VALUE_2=ikemoto.riku.86w@gmail.com
    command: sleep infinity
    tty: true
    stdin_open: true

volumes:
  claude-code-config:
  codex-config:
  gemini-config:
